{% extends "layout.html" %}

{% block container %}
<div class="flex justify-center mt-16">
    <div class="max-w-md w-full p-6 bg-white border border-gray-200 rounded-lg shadow-md text-center">

        <svg style="color: #ef4444; width: 40px; height: 40px; margin: 0 auto 16px auto;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>

        <h3 class="mb-5 text-lg font-medium text-gray-900" style="color: #111827;">
            ¿Estás seguro de que deseas eliminar a <br>
            <strong class="text-xl" style="font-weight: bold;">{{ form.nombre.data }} {{ form.apaterno.data }}</strong>?
        </h3>

        <form action="{{ url_for('eliminar') }}" method="POST" class="mt-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="hidden" style="display: none;">
                {{ form.id }}
            </div>
            
            <div class="flex justify-center gap-4" style="display: flex; justify-content: center; gap: 16px;">
                
                <button type="submit" style="background-color: #dc2626; color: #ffffff; padding: 10px 20px; border-radius: 9999px; font-weight: 500; border: none; cursor: pointer; transition: background-color 0.2s;">
                    Eliminar
                </button>
                
                <a href="{{ url_for('index') }}" style="background-color: transparent; color: #1f2937; padding: 10px 20px; border-radius: 9999px; font-weight: 500; border: 1px solid #d1d5db; text-decoration: none; cursor: pointer;">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>
{% endblock %}

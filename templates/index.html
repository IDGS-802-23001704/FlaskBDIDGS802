{% extends "layout.html" %} {% block container %} {% import "_macros.html" as
macros %}

<div
  style="margin-top: 50px"
  class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-base border border-default">
  
  <div class="flex justify-start p-4 border-b border-default">
    <a href="alumnos">
      <button type="button" class="inline-flex items-center text-white bg-brand hover:bg-brand-strong box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded-base text-sm px-4 py-2.5 focus:outline-none">
        Nuevo Alumno
        <span class="inline-flex items-center justify-center w-4.5 h-4.5 ms-2 text-xs font-medium text-fg-brand-strong bg-brand-soft rounded-full dark:text-fg-brand-subtle">+</span>
      </button>
    </a>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-sm text-left table-fixed">
      <thead class="text-sm text-body bg-neutral-secondary-soft border-b border-default">
        <tr>
          <th class="w-1/6 px-4 py-4 font-medium">Nombre</th>
          <th class="w-1/6 px-4 py-4 font-medium">Apellido</th>
          <th class="w-1/3 px-4 py-4 font-medium">Email</th>
          <th class="w-1/12 px-5 py-4 font-medium">Editar</th>
          <th class="w-1/12 px-5 py-4 font-medium">Detalles</th>
          <th class="w-1/12 px-5 py-4 font-medium">Eliminar</th>
        </tr>
      </thead>
      <tbody>
        {% for alum in alumno %}
        <tr class="bg-neutral-primary border-b border-default hover:bg-neutral-secondary-soft transition-colors">
          <td class="px-4 py-4 font-medium text-heading whitespace-nowrap">
            {{alum.nombre}}
          </td>
          <td class="px-4 py-4">{{alum.apaterno}}</td>
          <td class="px-4 py-4 truncate">{{alum.email}}</td>

          <td class="px-4 py-4">
            <div class="flex items-center justify-start">
              <a href="{{ url_for('modificar', id=alum.id) }}"
                class="relative inline-flex items-center justify-center p-0.5 overflow-hidden text-sm font-medium text-heading rounded-base group bg-gradient-to-br from-red-200 via-red-300 to-yellow-200 hover:scale-105 transition-transform">
                <span
                  class="relative px-3 py-2 transition-all ease-in duration-75 bg-neutral-primary-soft rounded-base group-hover:bg-transparent leading-5">
                  Editar
                </span>
              </a>
            </div>
          </td>

          <td class="px-4 py-4">
            <div class="flex items-center justify-start">
              <a href="{{ url_for('detalles', id=alum.id) }}"
                class="relative inline-flex items-center justify-center p-0.5 overflow-hidden text-sm font-medium text-heading rounded-base group bg-gradient-to-br from-teal-300 to-lime-300 hover:scale-105 transition-transform">
                <span
                  class="relative px-3 py-2 transition-all ease-in duration-75 bg-neutral-primary-soft rounded-base group-hover:bg-transparent leading-5">
                  Detalles
                </span>
              </a>
            </div>
          </td>

          <td class="px-4 py-4">
            <div class="flex items-center justify-start">
              <a href="{{ url_for('eliminar', id=alum.id) }}"
                class="relative inline-flex items-center justify-center p-0.5 overflow-hidden text-sm font-medium text-heading rounded-base group bg-gradient-to-br from-purple-500 to-pink-500 hover:scale-105 transition-transform">
                <span class="relative px-3 py-2 transition-all ease-in duration-75 bg-neutral-primary-soft rounded-base group-hover:bg-transparent leading-5">
                  Eliminar
                </span>
              </a>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>



{% endblock %}

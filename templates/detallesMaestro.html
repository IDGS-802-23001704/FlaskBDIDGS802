{% extends "layout.html" %} 
{% block container %} 

<div class="flex justify-center mt-10">
    <div class="w-full max-w-sm p-6 bg-white border border-gray-200 rounded-lg shadow-md">
        <h5 class="mb-4 text-2xl font-bold text-gray-900 text-center">Ficha del Maestro</h5>
        
        <ul role="list" class="space-y-4 my-6 text-gray-700">
            <li class="flex items-center">
                <strong class="mr-2">Matrícula:</strong> {{matricula}}
            </li>
            <li class="flex items-center">
                <strong class="mr-2">Nombre:</strong> {{nombre}}
            </li>
            <li class="flex items-center">
                <strong class="mr-2">Apellidos:</strong> {{apellidos}}
            </li>
            <li class="flex items-center">
                <strong class="mr-2">Especialidad:</strong> {{especialidad}}
            </li>
            <li class="flex items-center">
                <strong class="mr-2">Correo:</strong> {{correo}}
            </li>
        </ul>
        
        <div class="mt-6">
            <a href="{{ url_for('maestros.dashboardMaestro') }}" class="block w-full text-center text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-4 py-2.5 focus:outline-none transition-colors">
                Regresar
            </a>
        </div>
    </div>
</div>

{% endblock %}

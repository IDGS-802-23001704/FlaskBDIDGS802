{% extends "layout.html" %}

{% block container %}

{% import "_macros.html" as macros %}

<div class="relative bg-neutral-primary-soft max-w-xs w-full p-6 border border-default rounded-base shadow-xs">

    <div class="flex justify-center mt-10">
    <div class="max-w-sm p-6 bg-white border border-gray-200 rounded-lg shadow-md text-center">
        <h5 class="mb-2 text-2xl font-bold tracking-tight text-gray-900">
            {{ nombre }} {{ apaterno }}
        </h5>
        <p class="mb-5 font-normal text-gray-700">
            {{ email }}
        </p>
        
        <a href="{{ url_for('index') }}" class="inline-flex items-center px-4 py-2 text-sm font-medium text-center text-white bg-blue-600 rounded-lg hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300">
            Regresar al inicio
        </a>
    </div>
</div>

</div>

{% endblock %}
